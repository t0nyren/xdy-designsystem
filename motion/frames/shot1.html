<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:#241E1B;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:70px}
.steam{display:flex;gap:38px;align-items:flex-end;height:240px}
.steam path{fill:none;stroke:#C4993F;stroke-width:5;stroke-linecap:round;opacity:0}
.play .steam path{animation:rise 2.6s cubic-bezier(.4,0,.2,1) forwards}
.play .steam svg:nth-child(2) path{animation-delay:.4s}
.play .steam svg:nth-child(3) path{animation-delay:.8s}
@keyframes rise{0%{opacity:0;transform:translateY(46px) scaleY(.85)}30%{opacity:.95}70%{opacity:.75}100%{opacity:.35;transform:translateY(-40px) scaleY(1.06)}}
.t{font:600 64px/1.9 'Noto Serif SC',serif;color:#FCFBF8;letter-spacing:.3em;text-align:center;opacity:0}
.play .t{animation:fadein 1.4s cubic-bezier(.4,0,.2,1) 1.1s forwards}
@keyframes fadein{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
</style><link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#FCFBF8">
<link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png">
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'))}</script>
</head><body>
<div class="steam">
<svg width="60" height="240" viewBox="0 0 22 88"><path d="M11 84 Q2 66 11 50 Q20 34 11 18 Q6 8 11 2"/></svg>
<svg width="60" height="240" viewBox="0 0 22 88"><path d="M11 84 Q20 66 11 50 Q2 34 11 18 Q16 8 11 2"/></svg>
<svg width="60" height="240" viewBox="0 0 22 88"><path d="M11 84 Q2 66 11 50 Q20 34 11 18 Q6 8 11 2"/></svg>
</div>
<p class="t">熊大爷<br>现包饺子</p>
</body></html>
