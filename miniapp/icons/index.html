<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>熊大爷 V5.3 专属 SVG 图标</title><style>:root{--paper:#fcfbf8;--ink:#241e1b;--soft:#746e68;--line:#e7ddd2;--red:#a33a3e}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}.wrap{max-width:1080px;margin:auto;padding:64px 24px 90px}h1{font:700 clamp(32px,5vw,54px)/1.15 Georgia,"Noto Serif SC",serif;margin:12px 0}.eyebrow{font-size:12px;letter-spacing:.16em;color:#9b792c;font-weight:700}.lead{color:var(--soft);line-height:1.8;max-width:760px}.tokens{display:flex;gap:8px;flex-wrap:wrap;margin:24px 0 38px}.tokens span{background:#f3ece2;border-radius:99px;padding:8px 12px;font-size:12px;color:#765b1b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px}.pair{display:flex;align-items:center;gap:18px;margin-bottom:16px}.pair img{width:48px;height:48px}.card b{font-size:16px}.card p{font-size:11px;color:var(--soft);line-height:1.6;min-height:34px}.links{display:flex;gap:12px}.links a{color:var(--red);font-size:11px}.case{display:block;margin-top:30px;padding:18px 20px;border-radius:18px;background:#211c19;color:#fff;text-decoration:none}.case b{display:block}.case span{font-size:12px;color:#cfc6bf}@media(max-width:560px){.wrap{padding:42px 18px}.grid{grid-template-columns:1fr 1fr}.card{padding:16px}.pair img{width:40px;height:40px}.card p{display:none}}</style></head><body><main class="wrap"><div class="eyebrow">XIONG DAYE · ICON SYSTEM V5.3</div><h1>熊大爷专属图标系统</h1><p class="lead">不再把同一对熊耳贴到所有图标上，而是统一轻线、面皮弧线、褶纹节奏、圆润断口与局部印红。功能图标先保证一眼识别，身份与权益入口再加强熊猫和亲邻印记。</p><div class="tokens"><span>24px 画布</span><span>1.35px 轻线</span><span>默认暖灰</span><span>激活局部印红</span><span>一图一记忆点</span></div><section class="grid" id="grid"></section><a class="case" href="../icons-v53/"><b>查看三个真实页面场景</b><span>底部导航 / 点餐一级分类 / 我的页功能区</span></a></main><script>const items={home:['首页','屋檐由面皮弧线与三段褶纹构成'],order:['点餐','碗口、饺褶与单笔热气'],member:['会员码','二维码断角与中心熊印'],orders:['订单','票据上沿采用手工收口节奏'],profile:['我的','完整熊猫负形仅用于身份入口'],dine:['堂食','餐罩轮廓融入饺子褶纹'],pass:['亲邻券','券面收口与亲邻圆印'],recharge:['储值','钱包翻边形成面皮卷边'],group:['社群','人物关系以柔和断口连接'],points:['积分','印章齿边与熊猫眼圈'],cart:['购物车','篮口采用三段手工褶'],location:['门店定位','定位芯融入现包印记']};const grid=document.getElementById('grid');Object.entries(items).forEach(([k,v])=>grid.insertAdjacentHTML('beforeend',`<article class="card"><div class="pair"><img src="${k}-default.svg" alt="${v[0]}默认态"><img src="${k}-active.svg" alt="${v[0]}激活态"></div><b>${v[0]}</b><p>${v[1]}</p><div class="links"><a href="${k}-default.svg" download>默认态 SVG</a><a href="${k}-active.svg" download>激活态 SVG</a></div></article>`));</script></body></html>
