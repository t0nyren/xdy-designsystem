<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>熊大爷小程序 SVG 图标</title><style>body{margin:0;background:#fcfbf8;color:#241e1b;font-family:system-ui,sans-serif}.wrap{max-width:980px;margin:auto;padding:60px 24px}h1{font-family:serif}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}.card{background:#fff;border:1px solid #e9dfd3;border-radius:16px;padding:18px;text-align:center}.pair{display:flex;justify-content:center;gap:18px}.pair img{width:44px;height:44px}.card a{display:block;color:#9f3b3b;font-size:12px;margin-top:10px}p{color:#83776d}</style></head><body><main class="wrap"><h1>熊大爷专属小程序图标</h1><p>24px 画布 · 1.8px 圆角线宽 · 默认/激活两态 · SVG 可直接下载</p><div class="grid" id="grid"></div></main><script>var names={home:'首页',order:'点餐',member:'会员码',orders:'订单',profile:'我的',dine:'堂食',pass:'亲邻券',recharge:'储值',group:'社群',points:'积分',cart:'购物车',location:'门店定位'};var grid=document.getElementById('grid');Object.keys(names).forEach(function(k){grid.insertAdjacentHTML('beforeend','<div class="card"><div class="pair"><img src="'+k+'-default.svg"><img src="'+k+'-active.svg"></div><b>'+names[k]+'</b><a href="'+k+'-default.svg" download>默认态</a><a href="'+k+'-active.svg" download>激活态</a></div>')})</script></body></html>
